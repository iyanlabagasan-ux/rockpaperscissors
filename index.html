<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rock Papers Scissors </title>
    <!-- tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="p-4 flex justify-center">
        <div>
            <h1 class="text-4xl font-bold"> Play Rock, Paper, Scissors! </h1>
            <!-- Image Container -->
            <div class="p-4 size-100">
                <img src="rockpaperscissors.png" id ="game-image">
            </div>
             

              <!-- Options / Heads or Tails Button -->
            <div class="flex justify-evenly p-2 space-x-4">
                <button class="p-4 bg-pink-400 text-white rounded-lg shadow-lg" onclick="play(0)">Rock</button>
                <button class="p-4 bg-yellow-600 text-white rounded-lg shadow-lg" onclick="play(1)">Paper</button>
                <button class="p-4 bg-blue-600 text-white rounded-lg shadow-lg" onclick="play(2)">Scissors</button>
            </div>
        </div>  

    </div>
    <!-- Show Result -->
        <div class="p-4 bg-gray-50 border-1 border-gray-800">
            <div class="font-bold">Result</div>
            <div id="result"></div>
        </div>

    <script src="game.js"></script>
</body>
</html>
